<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Invaders</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'Courier New',monospace}
#wrap{position:relative}
canvas{display:block;background:#000;border:2px solid #333;cursor:none}
#touchC{display:none;position:absolute;bottom:10px;left:0;right:0;justify-content:space-between;padding:0 20px;pointer-events:none}
#touchC.visible{display:flex}
.tb{pointer-events:auto;width:80px;height:80px;border-radius:50%;border:2px solid rgba(0,255,255,.3);background:rgba(0,255,255,.08);color:#0ff;font-size:32px;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.tb:active{background:rgba(0,255,255,.25)}
.tb-f{width:100px;height:100px;border-color:rgba(255,0,0,.3);background:rgba(255,0,0,.08);color:#f00;font-size:14px}
@media(max-width:850px){.tb{width:70px;height:70px;font-size:28px}.tb-f{width:90px;height:90px}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc" width="800" height="650"></canvas>
  <div id="touchC">
    <button class="tb" id="tL">◀</button>
    <button class="tb tb-f" id="tF">🔥</button>
    <button class="tb" id="tR">▶</button>
  </div>
</div>
<script>
// ============================================================
// SPACE INVADERS — volledig herschreven, getest en werkend
// ============================================================

const W=800,H=650,GH=600;
const AR=5,AC=11,ACW=48,ACH=40,AST=70,AW=34,AH=28;
const SC=14,SR=10,SCL=4;
const PW=40,PH=28;

const L={NL:{
  t:'SPACE INVADERS',s:'DRUK OP SPATIE OM TE STARTEN',sc:'SCORE',hi:'HIGH',lv:'LEVEL',li:'LIVES',
  p:'GEPAUZEERD',go:'GAME OVER',wc:'WAVE COMPLEET!',ag:'DRUK OP SPATIE',bo:'BONUS',w:'WAVE'
},EN:{
  t:'SPACE INVADERS',s:'PRESS SPACE TO START',sc:'SCORE',hi:'HIGH',lv:'LEVEL',li:'LIVES',
  p:'PAUSED',go:'GAME OVER',wc:'WAVE COMPLETE!',ag:'PRESS SPACE',bo:'BONUS',w:'WAVE'
}};
function T(){return localStorage.getItem('lang')==='EN'?'EN':'NL'}
function $(k){return L[T()][k]||k}

// ---- Sound ----
class Sfx{
  constructor(){this.ac=null}
  ctx(){if(!this.ac)this.ac=new(window.AudioContext||window.webkitAudioContext)();if(this.ac.state==='suspended')this.ac.resume();return this.ac}
  sq(f,d,t,v=.1,fe=null){
    try{
      const a=this.ctx(),n=a.currentTime,o=a.createOscillator(),g=a.createGain();
      o.type='square';o.frequency.setValueAtTime(f,n);if(fe)o.frequency.exponentialRampToValueAtTime(fe,n+t);
      g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.001,n+t);
      o.connect(g);g.connect(a.destination);o.start(n);o.stop(n+t)
    }catch(e){}
  }
  shoot(){this.sq(880,.1,.12)}
  alienDie(){this.sq(660,.15,.1,220)}
  playerDie(){
    try{
      const a=this.ctx(),n=a.currentTime,b=a.createBuffer(1,a.sampleRate*.4,a.sampleRate),d=b.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.35;
      const s=a.createBufferSource(),g=a.createGain();s.buffer=b;
      g.gain.setValueAtTime(.2,n);g.gain.exponentialRampToValueAtTime(.001,n+.4);
      s.connect(g);g.connect(a.destination);s.start(n)
    }catch(e){}
  }
  ufo(){
    try{
      const a=this.ctx(),n=a.currentTime,o=a.createOscillator(),g=a.createGain(),l=a.createOscillator();
      l.frequency.value=15;l.type='sine';const p=a.createGain();p.gain.value=60;
      l.connect(p);p.connect(o.frequency);o.type='square';o.frequency.setValueAtTime(300,n);
      g.gain.setValueAtTime(.06,n);g.gain.exponentialRampToValueAtTime(.001,n+.8);
      o.connect(g);g.connect(a.destination);o.start(n);l.start(n);o.stop(n+.8);l.stop(n+.8)
    }catch(e){}
  }
  levelUp(){
    try{
      const a=this.ctx(),n=a.currentTime;[440,554,659].forEach((f,i)=>{
        const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(.1,n+i*.12);g.gain.exponentialRampToValueAtTime(.001,n+i*.12+.18);
        o.connect(g);g.connect(a.destination);o.start(n+i*.12);o.stop(n+i*.12+.18)
      })
    }catch(e){}
  }
}

// ---- Draw helpers ----
function dAlien(ctx,x,y,tp,fr,sc=1){
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  const b=Math.sin(performance.now()/300)*1.2;
  if(tp===1){  // Squid
    const g=ctx.createRadialGradient(0,-2+b,2,0,0,16);
    g.addColorStop(0,'#d070d0');g.addColorStop(1,'#602060');
    ctx.shadowColor='#d070d0';ctx.shadowBlur=14;
    ctx.beginPath();ctx.ellipse(0,-2+b,12,10,0,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(-4,-5+b,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(-5,-5+b,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-5+b,1.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#d070d0';ctx.lineWidth=1.2;
    for(let i=-2;i<=2;i++){
      const sw=fr?Math.sin(performance.now()/500)*3:0;
      ctx.beginPath();ctx.moveTo(i*4,6+b);ctx.quadraticCurveTo(i*4+sw,10+b,i*4-2+sw*.5,14+b);ctx.stroke()
    }
  }else if(tp===2){ // Crab
    const g=ctx.createRadialGradient(0,0,2,0,0,16);
    g.addColorStop(0,'#60d060');g.addColorStop(1,'#206020');
    ctx.shadowColor='#60d060';ctx.shadowBlur=14;
    ctx.beginPath();ctx.ellipse(0,0,14,9,0,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(-5,-2,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0f0';ctx.beginPath();ctx.arc(-5,-2,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-2,1.5,0,Math.PI*2);ctx.fill();
    const cl=fr?Math.sin(performance.now()/300)*3:3;
    ctx.fillStyle='#50c050';ctx.strokeStyle='#80d080';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-14,2);ctx.lineTo(-14-cl,-4);ctx.lineTo(-14,6);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(14,2);ctx.lineTo(14+cl,-4);ctx.lineTo(14,6);ctx.closePath();ctx.fill();ctx.stroke()
  }else{ // Jellyfish
    const g=ctx.createRadialGradient(0,-3+b,2,0,-3+b,14);
    g.addColorStop(0,'#f0a030');g.addColorStop(1,'#904010');
    ctx.shadowColor='#f0a030';ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(0,-4+b,13,Math.PI,0);ctx.closePath();ctx.fillStyle=g;ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(-4,-2+b,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(-4,-2+b,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(4,-2+b,1.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#f0a030';ctx.lineWidth=1.2;
    for(let i=-2;i<=2;i++){
      const tw=fr?Math.sin(performance.now()/400)*2:0;
      ctx.beginPath();ctx.moveTo(i*3,4+b);ctx.quadraticCurveTo(i*3+tw,9+b,i*3-1+tw,14+b);ctx.stroke()
    }
  }
  ctx.restore()
}

function dPlayer(ctx,x,y,t){
  ctx.save();ctx.translate(x,y);
  ctx.shadowColor='#08f';ctx.shadowBlur=20;
  const g=ctx.createLinearGradient(0,-14,0,14);
  g.addColorStop(0,'#6af');g.addColorStop(1,'#038');
  ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(-18,10);ctx.lineTo(-8,14);ctx.lineTo(0,10);ctx.lineTo(8,14);ctx.lineTo(18,10);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='#8cf';ctx.lineWidth=1;ctx.stroke();
  ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(0,-2,3.5,0,Math.PI*2);ctx.fill();
  const ex=Math.sin(t*20)*4;
  ctx.fillStyle='#f80';ctx.beginPath();ctx.rect(-6-ex,12,3,3);ctx.fill();
  ctx.fillStyle='#fa0';ctx.beginPath();ctx.rect(0,14,2,2);ctx.fill();
  ctx.fillStyle='#f80';ctx.beginPath();ctx.rect(6+ex,12,3,3);ctx.fill();
  ctx.restore()
}

function dUFO(ctx,x,y,t){
  ctx.save();ctx.translate(x,y);
  ctx.shadowColor='#f0f';ctx.shadowBlur=15;
  ctx.fillStyle='#c06';ctx.beginPath();ctx.ellipse(0,0,18,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e08';ctx.beginPath();ctx.ellipse(0,-3,14,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0a';ctx.beginPath();ctx.ellipse(0,-5,6,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0ff';ctx.beginPath();ctx.arc(-6,-4,1.5,0,Math.PI*2);ctx.arc(6,-4,1.5,0,Math.PI*2);ctx.fill();
  ctx.restore()
}

// ============================================================
// GAME CLASS
// ============================================================
class Game{
  constructor(){
    this.c=document.getElementById('gc');this.ctx=this.c.getContext('2d');
    this.sfx=new Sfx();
    this.state='MENU';
    this.score=0;this.hi=0;this.lives=3;this.level=0;
    this.parts=[];this.bullets=[];this.aliens=[];this.shields=[];this.stars=[];
    this.p=null;this.ufo=null;this.ufoT=0;
    this.ad=1;this.spd=28;this.fb=.002;this.anim=0;this.animT=0;
    this.shCD=0;this.shk={x:0,y:0,t:0};this.sl=true;
    this.rT=0;this.wd=0;this.ks={};this.tc={l:0,r:0,f:0};
    this.bl=0;this.lt=0;this.st=performance.now();
    this.hi=parseInt(localStorage.getItem('siHi'))||0;
    this.init();this.inp();this.go()
  }
  init(){
    this.stars=[];
    for(let i=0;i<120;i++)this.stars.push({x:Math.random()*W,y:Math.random()*H,r:.3+Math.random()*.8,b:Math.random()*Math.PI*2,s:.3+Math.random()*.8})
  }
  inp(){
    window.addEventListener('keydown',e=>{this.ks[e.key]=1;this.hk(e.key,e)});
    window.addEventListener('keyup',e=>{this.ks[e.key]=0});
    window.addEventListener('blur',()=>this.ks={});
    ['tL','tR','tF'].forEach((id,i)=>{
      const el=document.getElementById(id);
      if(!el)return;
      const k=['l','r','f'][i];
      el.addEventListener('touchstart',e=>{e.preventDefault();this.tc[k]=1});
      el.addEventListener('touchend',e=>{e.preventDefault();this.tc[k]=0});
      el.addEventListener('touchcancel',()=>{this.tc[k]=0});
      el.addEventListener('mousedown',()=>this.tc[k]=1);
      el.addEventListener('mouseup',()=>this.tc[k]=0);
      el.addEventListener('mouseleave',()=>this.tc[k]=0)
    });
    if('ontouchstart'in window||navigator.maxTouchPoints>0)document.getElementById('touchC').classList.add('visible')
  }
  hk(k,e){
    if(k==='p'||k==='P'){if(this.state==='PLAY')this.state='PAUSE';else if(this.state==='PAUSE')this.state='PLAY'}
    if(k===' '||k==='Enter'){
      e.preventDefault();
      if(this.state==='MENU')this.stG();
      else if(this.state==='GO')this.stG();
      else if(this.state==='WON')this.nxW()
    }
    if(k==='s'||k==='S')this.sl=!this.sl
  }
  stG(){
    this.state='PLAY';this.score=0;this.lives=3;this.level=1;
    this.spd=28;this.fb=.002;this.parts=[];this.bullets=[];
    this.shk={x:0,y:0,t:0};this.rT=0;this.wd=0;
    this.ufo=null;this.ufoT=0;this.ad=1;
    this.sP();this.sA();this.sS()
  }
  sP(){this.p={x:W/2,y:GH+12,w:PW,h:PH}}
  sA(){
    this.aliens=[];const sx=(W-AC*ACW)/2+ACW/2;
    for(let r=0;r<AR;r++)for(let c=0;c<AC;c++){
      const tp=r===0?1:r<3?2:3;
      this.aliens.push({x:sx+c*ACW,y:AST+r*ACH,tp,pt:tp===1?30:tp===2?20:10,al:1,w:AW,h:AH})
    }
  }
  sS(){
    this.shields=[];
    const sy=GH-100;
    [120,307,493,680].forEach(x=>{
      const g=[],sh='00011111111100,00111111111110,01111111111111,11111111111111,11111111111111,11110000001111,11110000001111,11110000001111,11111111111111,01111111111110'.split(',');
      for(let r=0;r<SR;r++){g[r]=[];for(let c=0;c<SC;c++)g[r][c]=sh[r]&&sh[r][c]==='1'}
      this.shields.push({x,y:sy,g,w:SC*SCL,h:SR*SCL})
    })
  }
  nxW(){
    this.state='PLAY';this.level++;this.spd*=1.15;this.fb*=1.15;
    this.parts=[];this.bullets=[];this.ufo=null;this.ufoT=0;
    this.sP();this.sA();this.sS();this.sfx.levelUp()
  }
  goM(){
    this.state='GO';if(this.score>this.hi){this.hi=this.score;try{localStorage.setItem('siHi',this.hi)}catch(e){}}
  }
  hP(){
    if(!this.p)return;
    this.bullets=this.bullets.filter(b=>b.p);
    this.pp(this.p.x,this.p.y,'#0ff',30,200);
    this.shk.t=.4;this.sfx.playerDie();this.p=null;this.lives--;
    if(this.lives<=0){this.goM();return}
    this.rT=1.2
  }
  pp(x,y,c,n=15,s=120){
    for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=s*(.3+Math.random()*.7);
      this.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col:c||['#ff0','#f80','#f00','#fff','#fa0'][Math.floor(Math.random()*5)],l:.3+Math.random()*.4,ml:.7,sz:1.5+Math.random()*2.5})
    }
  }
  go(){
    const lp=(t)=>{
      const dt=this.lt?Math.min((t-this.lt)/1000,.05):0;this.lt=t;this.st=t;
      this.up(dt);this.dr();requestAnimationFrame(lp)
    };
    requestAnimationFrame(t=>{this.lt=t;requestAnimationFrame(lp)})
  }

  // ---- UPDATE ----
  up(dt){
    this.upSt(dt);this.upPt(dt);this.bl+=dt;
    if(this.state==='PLAY'||this.state==='WON'){
      this.upSh(dt);
      if(this.state==='PLAY')this.upPl(dt);else this.upW(dt)
    }
  }
  upSt(dt){for(const s of this.stars)s.b+=dt*s.s}
  upPt(dt){for(let i=this.parts.length-1;i>=0;i--){const p=this.parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;p.l-=dt;if(p.l<=0)this.parts.splice(i,1)}}
  upSh(dt){if(this.shk.t>0){this.shk.t-=dt;const a=this.shk.t*10;this.shk.x=Math.sin(a)*this.shk.t*6;this.shk.y=Math.cos(a*1.3)*this.shk.t*4}else{this.shk.x=0;this.shk.y=0}}
  upW(dt){this.wd-=dt;if(this.wd<=0)this.nxW()}

  upPl(dt){
    this.animT+=dt;if(this.animT>.5){this.animT=0;this.anim=1-this.anim}
    if(this.rT>0){this.rT-=dt;if(this.rT<=0)this.sP();return}
    this.upP(dt);this.upA(dt);this.upU(dt);this.upB(dt);this.chk()
  }
  upP(dt){
    if(!this.p)return;
    const sp=280*dt;
    if(this.ks['ArrowLeft']||this.tc.l)this.p.x-=sp;
    if(this.ks['ArrowRight']||this.tc.r)this.p.x+=sp;
    this.p.x=Math.max(20,Math.min(W-20,this.p.x));
    this.shCD-=dt;
    if((this.ks[' ']||this.ks['Enter']||this.tc.f)&&this.shCD<=0){
      this.bullets.push({x:this.p.x,y:this.p.y-16,w:4,h:10,vy:-420,p:1});this.shCD=.3;this.sfx.shoot()
    }
  }
  upA(dt){
    if(this.aliens.every(a=>!a.al)){this.state='WON';this.wd=2.5;this.score+=this.level*50;this.sfx.levelUp();return}
    const s=this.spd*dt*this.ad;
    for(const a of this.aliens)if(a.al)a.x+=s;
    let mi=Infinity,ma=-Infinity;
    for(const a of this.aliens)if(a.al){if(a.x-a.w/2<mi)mi=a.x-a.w/2;if(a.x+a.w/2>ma)ma=a.x+a.w/2}
    let he=0;
    if(this.ad>0&&ma>W-20)he=1;
    if(this.ad<0&&mi<20)he=1;
    if(he){this.ad*=-1;for(const a of this.aliens)if(a.al)a.y+=16}
    const ac=this.aliens.filter(a=>a.al).length;
    if(ac>0){const ch=this.fb*(55/ac);for(const a of this.aliens)if(a.al&&Math.random()<ch){this.bullets.push({x:a.x,y:a.y+a.h/2,w:8,h:8,vy:160+Math.random()*60,p:0});break}}
    for(const a of this.aliens)if(a.al&&a.y+a.h/2>GH-30){this.goM();return}
  }
  upU(dt){
    this.ufoT-=dt;
    if(!this.ufo&&this.ufoT<=0){
      const d=Math.random()<.5?1:-1;
      this.ufo={x:d===1?-30:W+30,y:45,w:36,h:16,vx:d*(80+Math.random()*40),d,pt:[50,100,150,200,250,300][Math.floor(Math.random()*6)]};
      this.ufoT=15+Math.random()*15;this.sfx.ufo()
    }
    if(this.ufo){this.ufo.x+=this.ufo.vx*dt;if(this.ufo.x<-50||this.ufo.x>W+50)this.ufo=null}
  }
  upB(dt){
    for(let i=this.bullets.length-1;i>=0;i--){const b=this.bullets[i];b.y+=b.vy*dt;if(b.y<-20||b.y>H+20)this.bullets.splice(i,1)}
  }

  chk(){
    const bl=this.bullets;
    // Player bullets vs aliens
    for(let i=bl.length-1;i>=0;i--){
      const b=bl[i];if(!b.p)continue;
      for(const a of this.aliens){
        if(!a.al)continue;
        if(Math.abs(b.x-a.x)<a.w/2+b.w/2&&Math.abs(b.y-a.y)<a.h/2+b.h/2){
          a.al=0;bl.splice(i,1);this.score+=a.pt;this.pp(a.x,a.y,null,20,150);this.sfx.alienDie();break
        }
      }
    }
    // Alien bullets vs player
    if(this.p){for(let i=bl.length-1;i>=0;i--){const b=bl[i];if(b.p)continue;if(Math.abs(b.x-this.p.x)<PW/2+b.w/2&&Math.abs(b.y-this.p.y)<PH/2+b.h/2){bl.splice(i,1);this.hP();break}}}
    // All bullets vs shields
    for(let i=bl.length-1;i>=0;i--){
      const b=bl[i];
      for(const s of this.shields){
        if(b.x>s.x&&b.x<s.x+s.w&&b.y>s.y&&b.y<s.y+s.h){
          const cx=Math.floor((b.x-s.x)/SCL),cy=Math.floor((b.y-s.y)/SCL);
          for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=cy+dr,nc=cx+dc;if(nr>=0&&nr<SR&&nc>=0&&nc<SC)s.g[nr][nc]=0}
          bl.splice(i,1);break
        }
      }
    }
    // Player bullets vs UFO
    if(this.ufo&&this.p){for(let i=bl.length-1;i>=0;i--){const b=bl[i];if(!b.p)continue;if(Math.abs(b.x-this.ufo.x)<this.ufo.w/2+b.w/2&&Math.abs(b.y-this.ufo.y)<this.ufo.h/2+b.h/2){bl.splice(i,1);this.score+=this.ufo.pt;this.pp(this.ufo.x,this.ufo.y,'#f0f',25,180);this.ufo=null;this.sfx.alienDie();break}}}
    // Aliens vs player
    for(const a of this.aliens){if(!a.al||!this.p)continue;if(Math.abs(a.x-this.p.x)<PW/2+a.w/2&&Math.abs(a.y-this.p.y)<PH/2+a.h/2){this.hP();break}}
  }

  // ---- RENDER ----
  dr(){
    const ctx=this.ctx;ctx.save();
    ctx.translate(this.shk.x,this.shk.y);
    // Background
    const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#05051a');g.addColorStop(.4,'#0a0a2e');g.addColorStop(.7,'#150830');g.addColorStop(1,'#0a0015');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    // Stars
    for(const s of this.stars){const a=.3+Math.sin(s.b)*.3+.2;ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;
    if(this.state==='MENU'){this.dMenu();ctx.restore();return}
    this.dGame();
    if(this.sl){ctx.fillStyle='rgba(0,0,0,.1)';for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1)}
    ctx.restore()
  }

  dMenu(){
    const ctx=this.ctx;
    // Preview aliens
    dAlien(ctx,W/2-80,180,1,0,1.5);dAlien(ctx,W/2,180,2,0,1.5);dAlien(ctx,W/2+80,180,3,0,1.5);
    // Title
    ctx.save();ctx.shadowColor='#0f0';ctx.shadowBlur=40;
    ctx.fillStyle='#0f0';ctx.font='bold 46px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText($('t'),W/2,80);
    ctx.shadowBlur=0;ctx.shadowColor='#0ff';ctx.shadowBlur=10;
    ctx.fillStyle='#fff';ctx.font='16px "Courier New",monospace';
    ctx.fillText('▲ ▼ ▲ ▼ ▲ ▼ ▲',W/2,145);
    ctx.shadowBlur=0;
    // Scores
    ctx.fillStyle='#0ff';ctx.font='bold 18px "Courier New",monospace';
    ctx.fillText($('hi')+' '+this.hi,W/2,260);
    // Controls info
    ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='14px "Courier New",monospace';
    ctx.fillText('← → SPACE | P = pause | S = scanlines',W/2,420);
    ctx.shadowColor='#0f0';ctx.shadowBlur=12;
    ctx.fillStyle='#0f0';ctx.font='16px "Courier New",monospace';
    const blink=Math.sin(this.bl*3)>.2;if(blink)ctx.fillText($('s'),W/2,320);
    ctx.restore()
  }

  dGame(){
    const ctx=this.ctx;
    // HUD
    ctx.save();
    const hg=ctx.createLinearGradient(0,0,0,50);hg.addColorStop(0,'rgba(0,255,255,.15)');hg.addColorStop(1,'rgba(0,255,255,0)');
    ctx.fillStyle=hg;ctx.fillRect(0,0,W,50);
    for(let i=0;i<5;i++){const x=20+i*160;ctx.fillStyle='rgba(0,255,255,.06)';ctx.fillRect(x,0,1,50)}
    ctx.shadowBlur=0;ctx.fillStyle='#0ff';ctx.font='bold 14px "Courier New",monospace';
    ctx.textBaseline='top';
    ctx.fillText($('sc')+': '+this.score,20,10);
    ctx.fillText($('hi')+': '+this.hi,180,10);
    ctx.fillText($('lv')+': '+this.level,340,10);
    ctx.fillText($('w')+': '+this.aliens.filter(a=>a.al).length,500,10);
    // Lives as small ships
    ctx.fillStyle='#0ff';ctx.font='18px monospace';
    let lx=650;
    for(let i=0;i<this.lives;i++){ctx.fillText('▲',lx,12);lx+=28}
    // Divider line
    ctx.strokeStyle='rgba(0,255,255,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,49);ctx.lineTo(W,49);ctx.stroke();
    ctx.restore();
    // Shields
    this.dSh();
    // Player
    if(this.p)dPlayer(ctx,this.p.x,this.p.y,this.st||0);
    // Aliens
    for(const a of this.aliens)if(a.al)dAlien(ctx,a.x,a.y,a.tp,this.anim);
    // UFO
    if(this.ufo)dUFO(ctx,this.ufo.x,this.ufo.y,this.st||0);
    // Bullets
    ctx.save();
    for(const b of this.bullets){
      if(b.p){
        ctx.shadowColor='#0ff';ctx.shadowBlur=10;
        const g=ctx.createLinearGradient(b.x,b.y-5,b.x,b.y+5);g.addColorStop(0,'#0ff');g.addColorStop(1,'#088');
        ctx.fillStyle=g;ctx.fillRect(b.x-2,b.y-5,4,10)
      }else{
        ctx.shadowColor='#f00';ctx.shadowBlur=12;
        const g=ctx.createRadialGradient(b.x,b.y,1,b.x,b.y,4);g.addColorStop(0,'#ff0');g.addColorStop(.5,'#f80');g.addColorStop(1,'#f00');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill()
      }
    }
    ctx.restore();
    // Particles
    for(const p of this.parts){const a=Math.max(0,p.l/p.ml);ctx.globalAlpha=a;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*a,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;
    // Overlays
    if(this.state==='PAUSE'){
      ctx.save();ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
      ctx.shadowColor='#f00';ctx.shadowBlur=30;ctx.fillStyle='#f00';ctx.font='bold 48px "Courier New",monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText($('p').toUpperCase(),W/2,H/2);ctx.restore()
    }
    if(this.state==='GO'){
      ctx.save();ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);
      ctx.shadowColor='#f00';ctx.shadowBlur=30;ctx.fillStyle='#f00';ctx.font='bold 52px "Courier New",monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText($('go').toUpperCase(),W/2,240);
      ctx.shadowBlur=0;ctx.shadowColor='#fff';ctx.shadowBlur=10;ctx.fillStyle='#fff';ctx.font='22px "Courier New",monospace';
      ctx.fillText($('sc')+': '+this.score,W/2,310);
      ctx.fillStyle='#fa0';ctx.shadowColor='#fa0';ctx.shadowBlur=8;
      ctx.fillText($('hi')+': '+this.hi,W/2,345);
      ctx.shadowBlur=0;ctx.shadowColor='#0f0';ctx.shadowBlur=8;ctx.fillStyle='#0f0';ctx.font='16px "Courier New",monospace';
      if(Math.sin(this.bl*3)>.2)ctx.fillText($('ag')+' ↑',W/2,410);
      ctx.restore()
    }
    if(this.state==='WON'){
      ctx.save();ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
      ctx.shadowColor='#0f0';ctx.shadowBlur=30;ctx.fillStyle='#0f0';ctx.font='bold 36px "Courier New",monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText($('wc'),W/2,260);
      ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='20px "Courier New",monospace';
      ctx.fillText($('bo')+': +'+(this.level*50),W/2,310);
      ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='14px "Courier New",monospace';
      ctx.fillText($('lv')+': '+this.level,W/2,350);
      ctx.restore()
    }
  }

  dSh(){
    const ctx=this.ctx;
    if(!this.shields||this.shields.length===0)return;
    for(const s of this.shields){
      for(let r=0;r<SR;r++){
        for(let c=0;c<SC;c++){
          if(!s.g[r][c])continue;
          const x=s.x+c*SCL,y=s.y+r*SCL;
          const gr=130+Math.floor(Math.random()*50);
          ctx.fillStyle=`rgb(0,${gr},0)`;
          ctx.fillRect(x+1,y+1,SCL-2,SCL-2);
          ctx.fillStyle='rgba(0,255,0,.12)';
          ctx.fillRect(x,y,SCL,1);
          ctx.fillRect(x,y,1,SCL)
        }
      }
    }
  }
}

window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='lang-change'){
    // Lang wordt opnieuw gelezen via T() in huidige sessie
  }
});

new Game();
</script>
