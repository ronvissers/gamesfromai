<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Snake</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background:#000; color:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .wrapper { text-align:center; }
    canvas { border: 2px solid #0f3; background:#111; display:block; margin:0 auto; }
    #panel { margin-top: 12px; }
    button { padding: 8px 12px; border-radius:6px; border:1px solid #555; background:#222; color:#fff; cursor:pointer; }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Snake</h1>
    <canvas id="canvas" width="420" height="420" aria-label="Snake spel canvas"></canvas>
    <div id="panel">
      <span>Score: <strong id="score">0</strong></span>
      <button id="restart" style="margin-left:12px">Nieuw spel</button>
      <div id="over" style="margin-top:8px; color:#f66; display:none">Game over – druk Nieuw spel om opnieuw te beginnen</div>
    </div>
  </div>
  <script>
  (function(){
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scale = 20; // cell size
    const COLS = Math.floor(canvas.width / scale);
    const ROWS = Math.floor(canvas.height / scale);

    let snake = [ {x:5,y:5}, {x:4,y:5}, {x:3,y:5} ];
    let dir = {x:1, y:0};
    let food = {x:10, y:10};
    let score = 0;
    let gameOver = false;
    let speed = 120;
    let last = 0;

    function placeFood(){
      const empties = [];
      for (let y=0; y<ROWS; y++) for (let x=0; x<COLS; x++){
        if (!snake.some(s => s.x===x && s.y===y)) empties.push({x,y});
      }
      if (empties.length===0) return;
      const p = empties[Math.floor(Math.random()*empties.length)];
      food = p;
    }

    function draw(){
      ctx.fillStyle = '#000';
      ctx.fillRect(0,0,canvas.width, canvas.height);
      // food
      ctx.fillStyle = '#f00';
      ctx.fillRect(food.x*scale+2, food.y*scale+2, scale-4, scale-4);
      // snake
      ctx.fillStyle = '#0f0';
      for (const s of snake){
        ctx.fillRect(s.x*scale+2, s.y*scale+2, scale-4, scale-4);
      }
      document.getElementById('score').textContent = score;
    }

    function end(){
      gameOver = true;
      document.getElementById('over').style.display = 'block';
    }

    function update(){
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      // wall collision
      if (head.x < 0 || head.y < 0 || head.x >= COLS || head.y >= ROWS){ end(); return; }
      // self collision
      if (snake.some(s => s.x===head.x && s.y===head.y)){ end(); return; }
      snake.unshift(head);
      if (head.x===food.x && head.y===food.y){
        score += 10;
        placeFood();
      } else {
        snake.pop();
      }
    }

    function loop(ts){
      if (!last) last = ts;
      if (!gameOver && ts - last > speed){
        update();
        draw();
        last = ts;
      }
      if (!gameOver) requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => {
      const k = e.key;
      const nd = {x: dir.x, y: dir.y};
      if (k === 'ArrowUp' && dir.y !== 1) { nd.x = 0; nd.y = -1; }
      else if (k === 'ArrowDown' && dir.y !== -1) { nd.x = 0; nd.y = 1; }
      else if (k === 'ArrowLeft' && dir.x !== 1) { nd.x = -1; nd.y = 0; }
      else if (k === 'ArrowRight' && dir.x !== -1) { nd.x = 1; nd.y = 0; }
      dir.x = nd.x; dir.y = nd.y;
    });

    document.getElementById('restart').addEventListener('click', reset);

    function reset(){
      snake = [ {x:5,y:5}, {x:4,y:5}, {x:3,y:5} ];
      dir = {x:1, y:0};
      score = 0;
      gameOver = false;
      document.getElementById('over').style.display = 'none';
      placeFood();
      draw();
      last = 0;
      requestAnimationFrame(loop);
    }

    placeFood();
    draw();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
