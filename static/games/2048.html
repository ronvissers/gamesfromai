<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>2048</title>
  <style>
    html, body { height: 100%; }
    body { display: flex; align-items: center; justify-content: center; height: 100%; font-family: Arial, sans-serif; background: #fafafa; }
    #wrapper { text-align: center; }
    #grid { width: 420px; height: 420px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; background: #bbada0; border-radius: 8px; }
    .cell { width: 100%; height: 100%; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 28px; color: #776e65; background: #cdc1b4; }
    .tile-2 { background: #eee4da; color:#776e65; }
    .tile-4 { background: #ede0c8; color:#776e65; }
    .tile-8 { background:#f2b179; color:#f9f6f2; }
    .tile-16 { background:#f59563; color:#f9f6f2; }
    .tile-32 { background:#f67c5f; color:#f9f6f2; }
    .tile-64 { background:#f65e3b; color:#f9f6f2; }
    .tile-128 { background:#edcf72; color:#f9f6f2; }
    .tile-256 { background:#edcc61; color:#f9f6f2; }
    .tile-512 { background:#edc850; color:#f9f6f2; }
    .tile-1024 { background:#edc53f; color:#f9f6f2; }
    .tile-2048 { background:#edc22e; color:#f9f6f2; }
  </style>
</head>
<body>
  <div id="wrapper">
    <h1>2048</h1>
    <div id="grid"></div>
    <div id="score">Score: 0</div>
    <div style="margin-top:8px;">
      <button id="new">Nieuw spel</button>
    </div>
  </div>
  <script>
    (function(){
      const GRID = 4;
      let board = [];
      let score = 0;
      const gridEl = document.getElementById('grid');
      const initGrid = () => {
        board = Array.from({length:GRID}, ()=>Array(GRID).fill(0));
      };
      const cells = [];
      const render = ()=>{
        // ensure grid has 16 cells
        gridEl.innerHTML = '';
        for(let r=0;r<GRID;r++){
          for(let c=0;c<GRID;c++){
            const val = board[r][c];
            const div = document.createElement('div');
            div.className = 'cell' + (val>0 ? ' tile-' + val : '');
            div.textContent = val>0 ? val : '';
            gridEl.appendChild(div);
          }
        }
        document.getElementById('score').textContent = 'Score: ' + score;
      };
      const addTile = ()=>{
        const empties = [];
        for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) if(board[r][c]===0) empties.push([r,c]);
        if(empties.length===0) return false;
        const [r,c] = empties[Math.floor(Math.random()*empties.length)];
        board[r][c] = Math.random()<0.9 ? 2 : 4;
        return true;
      };
      const slideRowLeft = (row)=>{
        const arr = row.filter(v=>v!==0);
        let merged = [];
        let skip = false;
        let localScore = 0;
        for(let i=0;i<arr.length;i++){
          if(skip){ skip=false; continue; }
          if(i+1 < arr.length && arr[i]===arr[i+1]){
            merged.push(arr[i]*2);
            localScore += arr[i]*2;
            skip = true;
          } else {
            merged.push(arr[i]);
          }
        }
        while(merged.length < GRID) merged.push(0);
        return {row: merged, score: localScore};
      };
      const moveLeft = ()=>{
        let moved = false; let addScore = 0;
        for(let r=0;r<GRID;r++){
          const {row, score: s} = slideRowLeft(board[r]);
          board[r] = row;
          addScore += s;
          if(!arraysEqual(board[r], row)) moved = true; // if different
        }
        score += addScore;
        return moved || addScore>0;
      };
      // helper to compare arrays
      const arraysEqual = (a,b)=>a.length===b.length && a.every((v,i)=>v===b[i]);
      const transpose = (m)=>{
        const t = Array.from({length: GRID}, ()=>Array(GRID).fill(0));
        for(let i=0;i<GRID;i++) for(let j=0;j<GRID;j++) t[i][j] = m[j][i];
        return t;
      };
      const reverseRows = (m)=> m.map(r => [...r].reverse());
      const move = (dir)=>{
        // dir: 0=left,1=up,2=right,3=down
        let moved = false; let pre = JSON.stringify(board);
        if(dir===0){ // left
          moved = moveLeft();
        } else if(dir===1){ // up
          board = transpose(board);
          moved = moveLeft();
          board = transpose(board);
        } else if(dir===2){ // right
          board = reverseRows(board);
          moved = moveLeft();
          board = reverseRows(board);
        } else if(dir===3){ // down
          board = transpose(board);
          board = reverseRows(board);
          moved = moveLeft();
          board = reverseRows(board);
          board = transpose(board);
        }
        if (JSON.stringify(board) !== pre) moved = true; else moved = false;
        if(moved){ addTile(); }
        render();
        // check lose
        if(!canMove()) {
          alert('Game over');
        }
      };
      const canMove = ()=>{
        // If any zero, can move
        for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) if(board[r][c]===0) return true;
        // try moves
        const copy = board.map(row=>row.slice());
        const testLeft = () => {
          for(let r=0;r<GRID;r++){
            const arr = board[r].filter(v=>v!==0);
            for(let i=0;i<arr.length-1;i++) if(arr[i]===arr[i+1]) return true;
          }
          return false;
        };
        const testAny = (b)=>true; // simplified: if there are no zeros and no merges, we'll still return true below
        if (testLeft()) return true;
        // quick check for vertical merges by simulating up move
        const t = transpose(board);
        // check left on transposed would be merges
        for(let r=0;r<GRID;r++){
          const arr = t[r].filter(v=>v!==0);
          for(let i=0;i<arr.length-1;i++) if(arr[i]===arr[i+1]) return true;
        }
        return false;
      };
      // keyboard
      document.addEventListener('keydown', e=>{
        const k = e.key;
        if(k==='ArrowLeft') { move(0); }
        if(k==='ArrowUp') { move(1); }
        if(k==='ArrowRight') { move(2); }
        if(k==='ArrowDown') { move(3); }
      });
      document.getElementById('new').addEventListener('click', ()=>{ initGame(); startGame(); });
      let gameStarted = false;
      function startGame(){
        gameStarted = true;
      }
      function initGame(){
        initGrid();
        score = 0;
        addTile(); addTile();
        render();
      }
      // start
      initGame();
      render();
      window.addEventListener('resize', ()=>{});
    })();
  </script>
</body>
</html>
